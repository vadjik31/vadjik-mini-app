<style>
  :root{
    --bg:#0c0d10; --card:#15171c; --card2:#1b1e25; --line:#262a33;
    --txt:#eef0f4; --mut:#9aa1ad; --accent:#3b82f6;
    --amber:#f59e0b; --blue:#3b82f6; --violet:#8b5cf6; --emerald:#10b981;
    --rose:#f43f5e; --cyan:#06b6d4; --teal:#14b8a6; --orange:#f97316;
    --indigo:#6366f1; --pink:#ec4899;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:15px;line-height:1.5;overscroll-behavior-y:none}
  body{padding-bottom:96px}
  .wrap{max-width:680px;margin:0 auto;padding:0 16px}

  .hero{padding:24px 16px 8px;text-align:center}
  .hero h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
  .hero p{color:var(--mut);font-size:14px}

  .section-h{display:flex;align-items:center;gap:8px;margin:28px 0 12px}
  .section-h .bar{width:4px;height:18px;border-radius:2px;background:var(--accent)}
  .section-h h2{font-size:18px;font-weight:700}
  .section-h .cnt{margin-left:auto;color:var(--mut);font-size:13px}

  /* РЕЗУЛЬТАТЫ — карусель */
  .res-scroll{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 12px;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .res-scroll::-webkit-scrollbar{display:none}
  .res-card{flex:0 0 78%;max-width:280px;scroll-snap-align:center;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;display:flex;flex-direction:column}
  .res-card img{width:100%;height:150px;object-fit:cover;background:#000;cursor:pointer}
  .res-meta{padding:12px 14px}
  .res-num{font-size:22px;font-weight:800;line-height:1.1}
  .res-lbl{color:var(--mut);font-size:12px;margin-bottom:6px}
  .res-name{font-size:14px;font-weight:600}
  .res-loc{color:var(--mut);font-size:12.5px}
  .hint{text-align:center;color:var(--mut);font-size:12px;margin:-4px 0 4px}

  /* ТАРИФЫ */
  .tariff{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
  .tariff.popular{border-color:rgba(139,92,246,.5)}
  .tariff.vip{border-color:rgba(16,185,129,.5)}
  .tariff .badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;
    padding:3px 10px;border-radius:20px;letter-spacing:.5px}
  .badge.pop{background:rgba(139,92,246,.18);color:#c4b5fd}
  .badge.vip{background:rgba(16,185,129,.18);color:#6ee7b7}
  .t-name{font-size:19px;font-weight:800}
  .t-sub{color:var(--mut);font-size:13px;margin-bottom:12px}
  .t-price{font-size:30px;font-weight:800;letter-spacing:-1px}
  .t-price small{font-size:14px;color:var(--mut);font-weight:600}
  .t-result{font-size:13px;color:var(--mut);margin:6px 0 14px;
    padding:8px 12px;background:var(--card2);border-radius:10px}
  .t-feats{list-style:none;margin-bottom:14px}
  .t-feats li{display:flex;gap:8px;align-items:flex-start;font-size:13.5px;
    padding:4px 0;color:var(--txt)}
  .t-feats li.no{color:var(--mut)}
  .t-feats .ic{flex:0 0 18px;font-weight:700}
  .t-feats li .ic{color:var(--emerald)}
  .t-feats li.no .ic{color:#5a5f6b}
  .t-btn{width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;
    font-weight:700;color:#fff;cursor:pointer;background:var(--accent)}
  .tariff.base .t-btn{background:#3f434d}
  .tariff.flow .t-btn{background:var(--blue)}
  .tariff.popular .t-btn{background:linear-gradient(90deg,#8b5cf6,#a855f7)}
  .tariff.vip .t-btn{background:linear-gradient(90deg,#10b981,#14b8a6)}
  .t-more{width:100%;background:none;border:1px solid var(--line);color:var(--mut);
    border-radius:12px;padding:11px;font-size:13.5px;margin-top:8px;cursor:pointer}

  /* БОНУСЫ */
  .bonus-wrap{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.02));
    border:1px solid rgba(245,158,11,.25);border-radius:18px;padding:18px}
  .bonus-top{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
  .bonus-top b{font-size:16px}
  .bonus-top .val{margin-left:auto;color:var(--amber);font-weight:800;font-size:18px}
  .bonus-sub{color:var(--mut);font-size:13px;margin-bottom:14px}
  .bonus-item{display:flex;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
  .bonus-item .e{font-size:20px;flex:0 0 26px;text-align:center}
  .bonus-item b{font-size:14px;display:block}
  .bonus-item span{color:var(--mut);font-size:12.5px}

  /* BOTTOM SHEET */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);opacity:0;
    pointer-events:none;transition:opacity .25s;z-index:40}
  .sheet-bg.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;
    background:var(--bg);border-radius:20px 20px 0 0;border-top:1px solid var(--line);
    transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);z-index:41;
    padding:20px 18px 110px}
  .sheet.on{transform:translateY(0)}
  .sheet-grab{width:40px;height:4px;border-radius:2px;background:#3a3f49;
    margin:0 auto 16px}
  .sheet h3{font-size:21px;font-weight:800;margin-bottom:2px}
  .sheet .ssub{color:var(--mut);font-size:13px;margin-bottom:14px}
  .sheet .intro{font-size:14px;color:#cdd2db;margin-bottom:16px}
  .sheet img.shot{width:100%;border-radius:12px;border:1px solid var(--line);margin:10px 0}
  .sheet .blk{background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:12px}
  .sheet .blk h4{font-size:15px;margin-bottom:6px}
  .sheet .blk p{font-size:13.5px;color:var(--mut)}
  .sheet .blk ul{margin:6px 0 0 18px;font-size:13.5px;color:#cdd2db}
  .sheet .blk li{margin-bottom:4px}
  .sum{background:linear-gradient(135deg,rgba(59,130,246,.1),transparent);
    border:1px solid rgba(59,130,246,.2);border-radius:14px;padding:14px}
  .sum h4{font-size:14px;margin-bottom:8px}
  .sum li{font-size:13.5px;color:#cdd2db;margin:0 0 5px 18px}
  .free{display:inline-block;background:rgba(16,185,129,.18);color:#6ee7b7;
    font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:6px}

  /* image viewer */
  .viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:60;
    display:none;align-items:center;justify-content:center;padding:16px}
  .viewer.on{display:flex}
  .viewer img{max-width:100%;max-height:90vh;border-radius:8px}
  .viewer .x{position:absolute;top:14px;right:18px;color:#fff;font-size:30px;cursor:pointer}

  /* sticky CTA */
  .cta-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(12,13,16,.95);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);
    padding:12px 16px;z-index:30}
  .cta-bar .inner{max-width:680px;margin:0 auto;display:flex;gap:10px}
  .cta-main{flex:1;background:linear-gradient(90deg,#10b981,#14b8a6);color:#fff;
    border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
  .cta-site{flex:0 0 auto;background:var(--card);border:1px solid var(--line);
    color:var(--txt);border-radius:13px;padding:14px 16px;font-size:14px;cursor:pointer}
</style>
</head>

}).join('');

// ---- render тарифы ----
document.getElementById('tariffs').innerHTML = TARIFFS.map((t,i)=>{
  const badge = t.badge?`<span class="badge ${t.badgeCls}">${t.badge}</span>`:'';
  const feats = t.feats.map(f=>`<li class="${f[1]?'':'no'}"><span class="ic">${f[1]?'✓':'×'}</span>${f[0]}</li>`).join('');
  return `<div class="tariff ${t.cls}">${badge}
    <div class="t-name">${t.name}</div>
    <div class="t-sub">${t.sub}</div>
    <div class="t-price">$${t.price.toLocaleString()} <small>USD</small></div>
    <div class="t-result">${t.result}</div>
    <ul class="t-feats">${feats}</ul>
    <button class="t-btn" onclick="book()">${t.cta}</button>
    <button class="t-more" onclick="openSheet(${i})">Что входит подробно →</button>
  </div>`;
}).join('');

// ---- render бонусы ----
document.getElementById('bonuses').innerHTML = BONUSES.map(b=>
  `<div class="bonus-item"><span class="e">${b.e}</span>
    <div><b>${b.n}</b><span>${b.d}</span></div></div>`).join('');

// ---- bottom sheet ----
function openSheet(i){
  const t = TARIFFS[i], d = t.detail;
  let html = `<h3>${t.name}${t.badge?` <span class="free">${t.badge}</span>`:''}</h3>
    <div class="ssub">${t.sub} · $${t.price.toLocaleString()}</div>
    <div class="intro">${d.intro}</div>`;
  d.blocks.forEach(b=>{
    html += `<div class="blk"><h4>${b.h}${b.free?' <span class="free">БЕСПЛАТНО</span>':''}</h4>`;
    if(b.img) html += `<img class="shot" src="${b.img}" onclick="viewImg('${b.img}')">`;
    if(b.p) html += `<p>${b.p}</p>`;
    if(b.ul) html += `<ul>${b.ul.map(x=>`<li>${x}</li>`).join('')}</ul>`;
    html += `</div>`;
  });
  html += `<div class="sum"><h4>Итог: что получаете</h4><ul>${d.summary.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('sheet').classList.add('on');
  document.getElementById('sheetBg').classList.add('on');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('sheetBg').classList.remove('on');
}

// ---- image viewer ----
function viewImg(src){
  document.getElementById('viewerImg').src = src;
  document.getElementById('viewer').classList.add('on');
}

// ---- CTA ----
function book(){
  if(TG && TG.openTelegramLink){ TG.openTelegramLink(CONTACT); }
  else { window.open(CONTACT,'_blank'); }
}
function openSite(){
  if(TG && TG.openLink){ TG.openLink(SITE); }
  else { window.open(SITE,'_blank'); }
}
</script>
</body>
</html>
